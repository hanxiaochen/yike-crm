<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 - CRM管理系统</title>
<style>
:root{--primary:#1a73e8;--primary-dark:#1557b0;--danger:#d93025;--success:#188038;--bg:#f0f2f5;--sidebar:#1e293b;--text:#1f2937;--text-light:#6b7280;--card:#fff;--border:#e5e7eb;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#1e293b 0%,#334155 50%,#1e293b 100%);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-container{width:400px;max-width:90vw}
.login-card{background:var(--card);border-radius:16px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:24px;color:var(--sidebar);margin-bottom:8px}
.login-logo h1 span{color:var(--primary)}
.login-logo p{font-size:14px;color:var(--text-light)}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text)}
.form-group input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;transition:border .2s}
.form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,115,232,.15)}
.btn-login{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;transition:background .2s;font-family:inherit}
.btn-login:hover{background:var(--primary-dark)}
.btn-login:active{transform:scale(.98)}
.error-msg{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:8px}
.error-msg.show{display:flex}
.login-footer{text-align:center;margin-top:24px;font-size:12px;color:rgba(255,255,255,.5)}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <h1>🛡️ <span>CRM</span> 管理系统</h1>
      <p>奇智科技 · 差异化客户关系管理平台</p>
    </div>
    <div class="error-msg" id="errorMsg">⚠️ <span id="errorText"></span></div>
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">登 录</button>
    </form>
  </div>
  <div class="login-footer">© 2026 奇智科技（北京）有限公司</div>
</div>
<script>
function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorMsg').classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}
async function handleLogin(e) {
  e.preventDefault();
  hideError();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) { showError('请输入用户名和密码'); return false; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '登录中...';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await r.json();
    if (r.ok) {
      localStorage.setItem('crm_token', data.token);
      localStorage.setItem('crm_user', JSON.stringify(data.user));
      window.location.href = '/index';
    } else {
      showError(data.error || '登录失败');
    }
  } catch(e) {
    showError('网络错误，请稍后重试');
  }
  btn.disabled = false;
  btn.textContent = '登 录';
  return false;
}
// 支持Enter键登录
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { handleLogin(e); }
});
// 检查是否已登录
(function() {
  const token = localStorage.getItem('crm_token');
  if (token) {
    fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => { if (r.ok) window.location.href = '/index'; });
  }
})();
</script>
</body>
</html>
